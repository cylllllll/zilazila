      <circle cx="534" cy="202" r="19"/>
    </clipPath>
    <clipPath id="bottomDialClip">
      <circle cx="534" cy="260" r="19"/>
    </clipPath>
  </defs>

  <!-- Antennas, behind the cabinet -->
  <g id="antennas" stroke-linecap="round" stroke-linejoin="round">
    <path d="M332 85 L378 130" fill="none" stroke="#061014" stroke-width="7"/>
    <path d="M332 85 L378 130" fill="none" stroke="#dce8e9" stroke-width="3.5"/>
    <path d="M434 76 L397 130" fill="none" stroke="#061014" stroke-width="7"/>
    <path d="M434 76 L397 130" fill="none" stroke="#dce8e9" stroke-width="3.5"/>

