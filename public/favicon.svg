    <path d="M509.4 304.9 L557.6 304.9"/>
    <path d="M509.2 313 L557.7 313"/>
    <path d="M509.2 321.1 L557.6 321.1"/>
    <path d="M509.5 329.2 L557.2 329.2"/>
    <path d="M510 337.3 L556.8 337.3"/>
