  <path d="M344.2 372.2 C368.1 370.5 405.3 370.6 428.4 372.7 C435.3 373.4 435.2 381.4 428.2 382.1 C403.4 384.6 368.1 384.3 343.6 382.5 C336.6 382 337.1 373 344.2 372.2 Z"
