    <circle cx="531.7" cy="262.5" r="21.4" fill="#0089bc" opacity="0.75"/>
    <circle cx="534" cy="260" r="21.1" fill="#e6eded" stroke="#061014" stroke-width="3.3"/>
    <path d="M519.6 246.2 C512.8 255.1 514.9 269.2 523.8 275.8"
