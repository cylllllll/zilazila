<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="800" height="480" viewBox="0 0 800 480"
     role="img" aria-labelledby="title desc">
  <title id="title">Cartoon retro television</title>
  <desc id="desc">A hand-drawn blue retro television with twin antennas, rounded screen, two tuning knobs, ventilation slots and small feet on a transparent background.</desc>

