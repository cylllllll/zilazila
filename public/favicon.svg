  <path d="M284.7 245.5 C286.5 225 294.7 209.2 311.1 202.2 C317.8 199.4 325.8 196.7 328.1 198.4 C330.3 200.3 326 203.1 322.2 204.6 C302.1 212.7 291.1 226.2 286.9 245.8 C286.3 248.8 284.4 249.1 284.7 245.5 Z"
